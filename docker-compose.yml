services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=factory_cloud
      - POSTGRES_USER=factory_cloud
      - POSTGRES_PASSWORD=factory_cloud_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173
      - APP_ENV=development
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql+psycopg://factory_cloud:factory_cloud_dev@postgres:5432/factory_cloud
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
